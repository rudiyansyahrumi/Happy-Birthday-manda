<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Amanda</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      overflow: hidden;
      background: linear-gradient(135deg, #fce7f3, #fdf2f8, #fff1f2);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .loading {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg,#ffe4e6,#fbcfe8,#fef3c7);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 999;
      animation: fadeOut 3s forwards;
      animation-delay: 3s;
    }

    .loading h1 {
      color: #be185d;
      margin-top: 20px;
      font-size: 40px;
      animation: pulse 2s infinite;
    }

    .loading p {
      color: #6b7280;
      margin-top: 10px;
    }

    .bar {
      width: 250px;
      height: 10px;
      background: rgba(255,255,255,.5);
      border-radius: 20px;
      overflow: hidden;
      margin-top: 20px;
    }

    .bar span {
      display: block;
      height: 100%;
      background: #ec4899;
      animation: load 3s linear forwards;
    }

    @keyframes load {
      from { width:0; }
      to { width:100%; }
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        visibility: hidden;
      }
    }

    .book {
      width: 350px;
      height: 520px;
      position: relative;
      perspective: 2500px;
    }

    .page {
      width: 100%;
      height: 100%;
      position: absolute;
      transform-origin: left;
      transition: transform 1s;
      transform-style: preserve-3d;
      cursor: pointer;
    }

    .page.flipped {
      transform: rotateY(-180deg);
    }

    .front,
    .back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 20px;
      overflow-y: auto;
      background: #fffaf5;
      box-shadow: 0 15px 40px rgba(0,0,0,.15);
      padding: 25px;
    }

    .front {
      z-index: 2;
    }

    .back {
      transform: rotateY(180deg);
    }

    .page h1 {
      color: #be185d;
      margin-bottom: 15px;
      font-size: 30px;
      text-align: center;
    }

    .page p {
      color: #444;
      line-height: 1.8;
      font-size: 15px;
      white-space: pre-line;
      margin-top: 10px;
    }

    .photo {
      width: 100%;
      height: 240px;
      object-fit: cover;
      border-radius: 20px;
      margin-bottom: 15px;
      border: 8px solid white;
      box-shadow: 0 10px 20px rgba(0,0,0,.15);
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .confetti {
      position: absolute;
      top: -20px;
      font-size: 25px;
      animation: fall linear infinite;
    }

    @keyframes fall {
      to {
        transform: translateY(120vh) rotate(360deg);
      }
    }

    .butterfly {
      position: absolute;
      font-size: 40px;
      animation: fly 6s ease-in-out infinite;
    }

    @keyframes fly {
      0% { transform: translate(0,0); }
      50% { transform: translate(40px,-30px); }
      100% { transform: translate(0,0); }
    }

    .music {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #ec4899;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0,0,0,.2);
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
  </style>
</head>
<body>

<div class="loading">
  <div style="font-size:80px">📖</div>
  <h1>Loading Your Story</h1>
  <p>Menyiapkan kenangan dan semua rasa ✨</p>
  <div class="bar"><span></span></div>
</div>

<div class="butterfly" style="top:10%;left:10%;">🦋</div>
<div class="butterfly" style="top:70%;right:10%;animation-duration:8s;">🦋</div>

<div class="book">

  <div class="page" onclick="this.classList.toggle('flipped')" style="z-index:8;">
    <div class="front">
      <img src="amanda.jpg" class="photo">
      <h1>Amanda Maulid Sawah</h1>
      <p>Happy Birthday Sayang 💖</p>
    </div>

    <div class="back">
      <h1>Happy Birthday</h1>
      <p>Semoga keinginan baik kita disegerakan.</p>
    </div>
  </div>

</div>

<button class="music" onclick="document.getElementById('lagu').play()">
  🎵 Play Music
</button>

<audio id="lagu" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
  for(let i=0;i<35;i++){
    const confetti=document.createElement('div');
    confetti.className='confetti';
    confetti.innerHTML=['🎉','✨','💖','🌸'][Math.floor(Math.random()*4)];
    confetti.style.left=Math.random()*100+'vw';
    confetti.style.animationDuration=(3+Math.random()*5)+'s';
    document.body.appendChild(confetti);
  }
</script>

</body>
</html>
